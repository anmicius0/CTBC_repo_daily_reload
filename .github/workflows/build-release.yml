name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: ctbc-repo-sync-linux
          - os: windows-latest
            asset_name: ctbc-repo-sync-windows
          - os: macos-latest
            asset_name: ctbc-repo-sync-macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python and dependencies
        run: |
          uv python install
          uv sync --frozen

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run pyinstaller --onefile --name ctbc-repo-sync --add-data=config:config --hidden-import=github --hidden-import=dotenv --hidden-import=requests --clean sync_repos.py

      - name: Build executable (Non-Windows)
        if: runner.os != 'Windows'
        run: |
          uv run pyinstaller \
            --onefile \
            --name ctbc-repo-sync \
            --add-data=config:config \
            --hidden-import=github \
            --hidden-import=dotenv \
            --hidden-import=requests \
            --clean \
            sync_repos.py

      - name: Package release
        shell: bash
        run: |
          mkdir -p ${{ matrix.asset_name }}
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp dist/ctbc-repo-sync.exe ${{ matrix.asset_name }}/
            echo "ctbc-repo-sync.exe" > ${{ matrix.asset_name }}/executable_name.txt
          else
            cp dist/ctbc-repo-sync ${{ matrix.asset_name }}/
            echo "ctbc-repo-sync" > ${{ matrix.asset_name }}/executable_name.txt
          fi
          cp -r config ${{ matrix.asset_name }}/
          if [ -f config/.env.example ]; then
            cp config/.env.example ${{ matrix.asset_name }}/config/
          fi
          cp config/org-github.json ${{ matrix.asset_name }}/config/
          cp pyproject.toml ${{ matrix.asset_name }}/
          cp README.md ${{ matrix.asset_name }}/

      - name: Create archive
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell Compress-Archive -Path ${{ matrix.asset_name }} -DestinationPath ${{ matrix.asset_name }}.zip
          else
            tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*
          retention-days: 30

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (contains(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Format release date
        id: format_date
        run: echo "formatted_date=$(TZ='Asia/Taipei' date -d "${{ github.event.repository.pushed_at }}" '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Delete previous releases
        uses: sgpublic/delete-release-action@v1.1
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        with:
          release-drop: true
          release-keep-count: 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: CTBC Repo Sync ${{ steps.version.outputs.version }}
          body: |
            ## CTBC Repository Sync Tool ${{ steps.version.outputs.version }}

            Cross-platform executables for syncing GitHub repositories with Sonatype IQ Server.

            **Release Date:** ${{ steps.format_date.outputs.formatted_date }}
            **Downloads:**
            - Windows: `ctbc-repo-sync-windows.zip`
            - macOS: `ctbc-repo-sync-macos.tar.gz`
            - Linux: `ctbc-repo-sync-linux.tar.gz`

            **Quick Start:**
            1. Download and extract for your platform
            2. Create `.env` file in `config/` directory based on `.env.example`
            3. Configure organization settings in `config/org-github.json`
            4. Run: `./ctbc-repo-sync` (Linux/macOS) or `ctbc-repo-sync.exe` (Windows)

            No Python installation required.
          files: |
            ctbc-repo-sync-windows.zip
            ctbc-repo-sync-macos.tar.gz
            ctbc-repo-sync-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
